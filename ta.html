<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Automation Architecture</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050d1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Syne', sans-serif;
    padding: 16px;
  }
  .title {
    color: #7eb8f7;
    font-size: clamp(9px, 2vw, 13px);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 20px;
    text-align: center;
    opacity: 0;
    animation: fadeIn 0.6s 0.2s forwards;
  }
  .svg-wrapper { width: 100%; max-width: 960px; }
  svg#diagram { width: 100%; height: auto; display: block; overflow: visible; }
  .node-glow { opacity: 0.2; animation: nodePulse 2.5s ease-in-out infinite; }
  @keyframes nodePulse { 0%,100%{opacity:0.15} 50%{opacity:0.45} }
  @keyframes fadeIn { to{opacity:1} }
</style>
</head>
<body>
<div class="title">IAM &middot; Test Automation Architecture</div>
<div class="svg-wrapper">
<!--
  Layout (viewBox 960 x 620):
  Row 1: IAM Services Portal cx=160  |  Test Automation Services cx=480  |  Test Plan Execution cx=800   y=75..165  cy=120
  Row 2: Thread 1 cx=160  |  Thread 2 cx=480  |  Thread 3 cx=800                                         y=265..345 cy=305
  Row 3: IAM Services cx=160  |  IAM Services cx=480  |  IAM Services cx=800                             y=430..510 cy=470

  Thread columns perfectly aligned at cx=160, 480, 800
  Horizontal spacing: 320px between each column
  Each node width ~200px → gap = 120px between nodes
-->
<svg id="diagram" viewBox="0 0 960 590" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0c1e35" stroke-width="1"/>
    </pattern>
    <linearGradient id="gradPortal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a3060"/><stop offset="100%" style="stop-color:#071e42"/>
    </linearGradient>
    <linearGradient id="gradAuto" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003d6e"/><stop offset="100%" style="stop-color:#001f3f"/>
    </linearGradient>
    <linearGradient id="gradExec" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003358"/><stop offset="100%" style="stop-color:#001829"/>
    </linearGradient>
    <linearGradient id="gradThread" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a2a50"/><stop offset="100%" style="stop-color:#041828"/>
    </linearGradient>
    <linearGradient id="gradIAMSvc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#082030"/><stop offset="100%" style="stop-color:#031015"/>
    </linearGradient>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2a7fff"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00b8d9"/>
    </marker>
    <marker id="arrow-teal" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00d4aa"/>
    </marker>
    <filter id="glow-blue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-teal" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#0a1f38;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#020810;stop-opacity:0.7"/>
    </radialGradient>
  </defs>

  <rect width="960" height="590" fill="#050d1a"/>
  <rect width="960" height="590" fill="url(#grid)"/>
  <rect width="960" height="590" fill="url(#vignette)"/>

  <!-- ═══════════════════════════════════════════════════════
       ROW 1  —  cx=160 | 480 | 800   y=75..165  h=90
  ═══════════════════════════════════════════════════════ -->

  <!-- IAM Services Portal  cx=160  x=60..260 -->
  <g class="node-portal" style="opacity:0;transition:opacity 0.5s">
    <rect class="node-glow" x="56" y="75" width="208" height="90" rx="14" fill="#1a6aff"/>
    <rect x="60" y="79" width="200" height="82" rx="12" fill="url(#gradPortal)" stroke="#2a6acd" stroke-width="1.5"/>
    <text x="160" y="108" font-family="Syne,sans-serif" font-weight="700" font-size="17" text-anchor="middle" dominant-baseline="middle">&#x1F5A5;&#xFE0F;</text>
    <text x="160" y="131" font-family="Syne,sans-serif" font-weight="700" font-size="13" fill="#e8f4ff" text-anchor="middle" dominant-baseline="middle">IAM Services Portal</text>
    <text x="160" y="148" font-family="JetBrains Mono,monospace" font-size="9" fill="#5a8ab0" text-anchor="middle" dominant-baseline="middle">Management UI</text>
  </g>

  <!-- Test Automation Services  cx=480  x=380..580 -->
  <g class="node-auto" style="opacity:0;transition:opacity 0.5s">
    <rect class="node-glow" x="376" y="75" width="208" height="90" rx="14" fill="#0080ff" style="animation-delay:0.2s"/>
    <rect x="380" y="79" width="200" height="82" rx="12" fill="url(#gradAuto)" stroke="#1a7aff" stroke-width="1.5"/>
    <text x="480" y="108" font-family="Syne,sans-serif" font-weight="700" font-size="17" text-anchor="middle" dominant-baseline="middle">&#x2699;&#xFE0F;</text>
    <text x="480" y="131" font-family="Syne,sans-serif" font-weight="700" font-size="13" fill="#e8f4ff" text-anchor="middle" dominant-baseline="middle">Test Automation Svc</text>
    <text x="480" y="148" font-family="JetBrains Mono,monospace" font-size="9" fill="#5a8ab0" text-anchor="middle" dominant-baseline="middle">Orchestration Layer</text>
  </g>

  <!-- Test Plan Execution  cx=800  x=700..900 -->
  <g class="node-exec" style="opacity:0;transition:opacity 0.5s">
    <rect class="node-glow" x="696" y="75" width="208" height="90" rx="14" fill="#005fcc" style="animation-delay:0.4s"/>
    <rect x="700" y="79" width="200" height="82" rx="12" fill="url(#gradExec)" stroke="#1a5faa" stroke-width="1.5"/>
    <text x="800" y="108" font-family="Syne,sans-serif" font-weight="700" font-size="17" text-anchor="middle" dominant-baseline="middle">&#x25B6;&#xFE0F;</text>
    <text x="800" y="131" font-family="Syne,sans-serif" font-weight="700" font-size="13" fill="#e8f4ff" text-anchor="middle" dominant-baseline="middle">Test Plan Execution</text>
    <text x="800" y="148" font-family="JetBrains Mono,monospace" font-size="9" fill="#5a8ab0" text-anchor="middle" dominant-baseline="middle">Runtime Engine</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════
       ROW 2  —  Thread workers  cx=160 | 480 | 800   y=265..345
  ═══════════════════════════════════════════════════════ -->

  <!-- Thread 1  cx=160  x=60..260 -->
  <g class="node-t1" style="opacity:0;transition:opacity 0.5s">
    <rect class="node-glow" x="56" y="265" width="208" height="80" rx="14" fill="#006688" style="animation-delay:0.1s"/>
    <rect x="60" y="269" width="200" height="72" rx="12" fill="url(#gradThread)" stroke="#1a7a99" stroke-width="1.5"/>
    <text x="160" y="292" font-family="Syne,sans-serif" font-weight="700" font-size="14" text-anchor="middle" dominant-baseline="middle">&#x1F9F5;</text>
    <text x="160" y="311" font-family="Syne,sans-serif" font-weight="700" font-size="12" fill="#e8f4ff" text-anchor="middle" dominant-baseline="middle">Thread 1</text>
    <text x="160" y="328" font-family="JetBrains Mono,monospace" font-size="8.5" fill="#5a8ab0" text-anchor="middle" dominant-baseline="middle">Test Case Worker</text>
  </g>

  <!-- Thread 2  cx=480  x=380..580 -->
  <g class="node-t2" style="opacity:0;transition:opacity 0.5s">
    <rect class="node-glow" x="376" y="265" width="208" height="80" rx="14" fill="#006688" style="animation-delay:0.2s"/>
    <rect x="380" y="269" width="200" height="72" rx="12" fill="url(#gradThread)" stroke="#1a7a99" stroke-width="1.5"/>
    <text x="480" y="292" font-family="Syne,sans-serif" font-weight="700" font-size="14" text-anchor="middle" dominant-baseline="middle">&#x1F9F5;</text>
    <text x="480" y="311" font-family="Syne,sans-serif" font-weight="700" font-size="12" fill="#e8f4ff" text-anchor="middle" dominant-baseline="middle">Thread 2</text>
    <text x="480" y="328" font-family="JetBrains Mono,monospace" font-size="8.5" fill="#5a8ab0" text-anchor="middle" dominant-baseline="middle">Test Case Worker</text>
  </g>

  <!-- Thread 3  cx=800  x=700..900 -->
  <g class="node-t3" style="opacity:0;transition:opacity 0.5s">
    <rect class="node-glow" x="696" y="265" width="208" height="80" rx="14" fill="#006688" style="animation-delay:0.3s"/>
    <rect x="700" y="269" width="200" height="72" rx="12" fill="url(#gradThread)" stroke="#1a7a99" stroke-width="1.5"/>
    <text x="800" y="292" font-family="Syne,sans-serif" font-weight="700" font-size="14" text-anchor="middle" dominant-baseline="middle">&#x1F9F5;</text>
    <text x="800" y="311" font-family="Syne,sans-serif" font-weight="700" font-size="12" fill="#e8f4ff" text-anchor="middle" dominant-baseline="middle">Thread 3</text>
    <text x="800" y="328" font-family="JetBrains Mono,monospace" font-size="8.5" fill="#5a8ab0" text-anchor="middle" dominant-baseline="middle">Test Case Worker</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════
       ROW 3  —  IAM Services (per thread)  y=430..510
  ═══════════════════════════════════════════════════════ -->

  <!-- IAM Services (single, centered)  cx=480 -->
  <g class="node-s1" style="opacity:0;transition:opacity 0.5s">
    <rect class="node-glow" x="356" y="425" width="248" height="80" rx="14" fill="#004466"/>
    <rect x="360" y="429" width="240" height="72" rx="12" fill="url(#gradIAMSvc)" stroke="#1a5a6a" stroke-width="1.5"/>
    <text x="480" y="452" font-family="Syne,sans-serif" font-weight="700" font-size="14" text-anchor="middle" dominant-baseline="middle">&#x1F527;</text>
    <text x="480" y="471" font-family="Syne,sans-serif" font-weight="700" font-size="12" fill="#e8f4ff" text-anchor="middle" dominant-baseline="middle">IAM Services</text>
    <text x="480" y="488" font-family="JetBrains Mono,monospace" font-size="8.5" fill="#5a8ab0" text-anchor="middle" dominant-baseline="middle">Auth &amp; Identity Tests</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════
       PATHS
  ═══════════════════════════════════════════════════════ -->

  <!-- Path 1: IAM Services Portal → Test Automation Services (y=120) -->
  <path id="path1" d="M 260 120 L 380 120" fill="none" stroke="#2a7fff" stroke-width="2.5"
    stroke-linecap="round" stroke-dasharray="7,4" marker-end="url(#arrow-blue)" filter="url(#glow-blue)">
    <animate attributeName="stroke-dashoffset" from="200" to="0" dur="1.5s" repeatCount="indefinite"/>
  </path>
  <text id="lbl1" x="320" y="108" font-family="JetBrains Mono,monospace" font-size="9" fill="#4a7fa8" text-anchor="middle" opacity="0" style="transition:opacity 0.4s">Triggers Tests</text>
  <circle r="5" fill="#2a7fff" filter="url(#glow-blue)" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" dur="2s" repeatCount="indefinite" begin="0s"/>
    <animateMotion dur="2s" repeatCount="indefinite" begin="0s"><mpath href="#path1"/></animateMotion>
  </circle>

  <!-- Path 2: Test Automation Services → Test Plan Execution (y=120) -->
  <path id="path2" d="M 580 120 L 700 120" fill="none" stroke="#2a7fff" stroke-width="2.5"
    stroke-linecap="round" stroke-dasharray="7,4" marker-end="url(#arrow-blue)" filter="url(#glow-blue)">
    <animate attributeName="stroke-dashoffset" from="200" to="0" dur="1.5s" repeatCount="indefinite"/>
  </path>
  <text id="lbl2" x="640" y="108" font-family="JetBrains Mono,monospace" font-size="9" fill="#4a7fa8" text-anchor="middle" opacity="0" style="transition:opacity 0.4s">Executes Plan</text>
  <circle r="5" fill="#2a7fff" filter="url(#glow-blue)" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    <animateMotion dur="2s" repeatCount="indefinite" begin="0.5s"><mpath href="#path2"/></animateMotion>
  </circle>

  <!-- Path 3: Test Plan Execution → Thread 1 (diagonal left, 800→160) -->
  <path id="path3" d="M 760 161 L 200 265" fill="none" stroke="#00b8d9" stroke-width="2"
    stroke-linecap="round" stroke-dasharray="7,4" marker-end="url(#arrow-cyan)" filter="url(#glow-cyan)">
    <animate attributeName="stroke-dashoffset" from="200" to="0" dur="1.4s" repeatCount="indefinite"/>
  </path>

  <!-- Path 4: Test Plan Execution → Thread 2 (straight down, 800→480) -->
  <path id="path4" d="M 800 161 L 480 265" fill="none" stroke="#00b8d9" stroke-width="2"
    stroke-linecap="round" stroke-dasharray="7,4" marker-end="url(#arrow-cyan)" filter="url(#glow-cyan)">
    <animate attributeName="stroke-dashoffset" from="200" to="0" dur="1.4s" repeatCount="indefinite"/>
  </path>

  <!-- Path 5: Test Plan Execution → Thread 3 (straight down, 800→800) -->
  <path id="path5" d="M 840 161 L 800 265" fill="none" stroke="#00b8d9" stroke-width="2"
    stroke-linecap="round" stroke-dasharray="7,4" marker-end="url(#arrow-cyan)" filter="url(#glow-cyan)">
    <animate attributeName="stroke-dashoffset" from="200" to="0" dur="1.4s" repeatCount="indefinite"/>
  </path>

  <text id="lbl3" x="800" y="218" font-family="JetBrains Mono,monospace" font-size="9" fill="#3a9ab8" text-anchor="middle" opacity="0" style="transition:opacity 0.4s">Spins Up Threads</text>

  <!-- Thread balls -->
  <circle r="4" fill="#00b8d9" filter="url(#glow-cyan)" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite" begin="0.1s"/>
    <animateMotion dur="1.8s" repeatCount="indefinite" begin="0.1s"><mpath href="#path3"/></animateMotion>
  </circle>
  <circle r="4" fill="#00b8d9" filter="url(#glow-cyan)" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite" begin="0.4s"/>
    <animateMotion dur="1.8s" repeatCount="indefinite" begin="0.4s"><mpath href="#path4"/></animateMotion>
  </circle>
  <circle r="4" fill="#00b8d9" filter="url(#glow-cyan)" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite" begin="0.7s"/>
    <animateMotion dur="1.8s" repeatCount="indefinite" begin="0.7s"><mpath href="#path5"/></animateMotion>
  </circle>

  <!-- Path 6: Thread 1 → IAM Services (diagonal, 160→480) -->
  <path id="path6" d="M 160 341 L 400 425" fill="none" stroke="#00d4aa" stroke-width="2"
    stroke-linecap="round" stroke-dasharray="7,4" marker-end="url(#arrow-teal)" filter="url(#glow-teal)">
    <animate attributeName="stroke-dashoffset" from="200" to="0" dur="1.2s" repeatCount="indefinite"/>
  </path>

  <!-- Path 7: Thread 2 → IAM Services (straight down, 480→480) -->
  <path id="path7" d="M 480 341 L 480 425" fill="none" stroke="#00d4aa" stroke-width="2"
    stroke-linecap="round" stroke-dasharray="7,4" marker-end="url(#arrow-teal)" filter="url(#glow-teal)">
    <animate attributeName="stroke-dashoffset" from="150" to="0" dur="1.2s" repeatCount="indefinite"/>
  </path>

  <!-- Path 8: Thread 3 → IAM Services (diagonal, 800→480) -->
  <path id="path8" d="M 800 341 L 560 425" fill="none" stroke="#00d4aa" stroke-width="2"
    stroke-linecap="round" stroke-dasharray="7,4" marker-end="url(#arrow-teal)" filter="url(#glow-teal)">
    <animate attributeName="stroke-dashoffset" from="200" to="0" dur="1.2s" repeatCount="indefinite"/>
  </path>

  <text id="lbl4" x="480" y="390" font-family="JetBrains Mono,monospace" font-size="9" fill="#3ab898" text-anchor="middle" opacity="0" style="transition:opacity 0.4s">Tests IAM Services</text>

  <!-- IAM Services balls -->
  <circle r="4" fill="#00d4aa" filter="url(#glow-teal)" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite" begin="0.1s"/>
    <animateMotion dur="1.5s" repeatCount="indefinite" begin="0.1s"><mpath href="#path6"/></animateMotion>
  </circle>
  <circle r="4" fill="#00d4aa" filter="url(#glow-teal)" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite" begin="0.4s"/>
    <animateMotion dur="1.5s" repeatCount="indefinite" begin="0.4s"><mpath href="#path7"/></animateMotion>
  </circle>
  <circle r="4" fill="#00d4aa" filter="url(#glow-teal)" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite" begin="0.7s"/>
    <animateMotion dur="1.5s" repeatCount="indefinite" begin="0.7s"><mpath href="#path8"/></animateMotion>
  </circle>

  <!-- Legend -->
  <g transform="translate(24,558)">
    <line x1="0" y1="6" x2="22" y2="6" stroke="#2a7fff" stroke-width="2" stroke-dasharray="5,3"/>
    <circle cx="11" cy="6" r="3.5" fill="#2a7fff"/>
    <text x="28" y="10" font-family="JetBrains Mono,monospace" font-size="9" fill="#3a6a9a">Test Trigger</text>
    <line x1="130" y1="6" x2="152" y2="6" stroke="#00b8d9" stroke-width="2" stroke-dasharray="5,3"/>
    <circle cx="141" cy="6" r="3.5" fill="#00b8d9"/>
    <text x="158" y="10" font-family="JetBrains Mono,monospace" font-size="9" fill="#3a6a9a">Thread Spawn</text>
    <line x1="270" y1="6" x2="292" y2="6" stroke="#00d4aa" stroke-width="2" stroke-dasharray="5,3"/>
    <circle cx="281" cy="6" r="3.5" fill="#00d4aa"/>
    <text x="298" y="10" font-family="JetBrains Mono,monospace" font-size="9" fill="#3a6a9a">Service Tests</text>
  </g>
</svg>
</div>

<script>
['.node-portal','.node-auto','.node-exec',
 '.node-t1','.node-t2','.node-t3',
 '.node-s1'].forEach(sel => {
  const el = document.querySelector(sel);
  if (el) el.style.opacity = 0;
});

['path1','path2','path3','path4','path5','path6','path7','path8'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.style.opacity = 0;
});

document.querySelectorAll('circle[r="5"], circle[r="4"]').forEach(c => {
  c.style.display = 'none';
});

function showNode(sel) {
  const el = document.querySelector(sel);
  if (el) el.style.opacity = 1;
}
function showPath(id) {
  const el = document.getElementById(id);
  if (el) el.style.opacity = 1;
}
function showLabel(id) {
  const el = document.getElementById(id);
  if (el) el.style.opacity = 1;
}
function showBalls(pathId) {
  document.querySelectorAll('circle[r="5"], circle[r="4"]').forEach(c => {
    const mpath = c.querySelector('mpath');
    if (mpath && mpath.getAttribute('href') === '#' + pathId) {
      c.style.display = '';
    }
  });
}

const wait = ms => new Promise(r => setTimeout(r, ms));

async function runSequence() {
  await wait(300);
  showNode('.node-portal');

  await wait(600);
  showPath('path1'); showLabel('lbl1'); showBalls('path1');
  await wait(2000);
  showNode('.node-auto');

  await wait(400);
  showPath('path2'); showLabel('lbl2'); showBalls('path2');
  await wait(2000);
  showNode('.node-exec');

  await wait(400);
  showPath('path3'); showPath('path4'); showPath('path5');
  showLabel('lbl3');
  showBalls('path3'); showBalls('path4'); showBalls('path5');
  await wait(400);
  showNode('.node-t1');
  await wait(150);
  showNode('.node-t2');
  await wait(150);
  showNode('.node-t3');

  await wait(500);
  showPath('path6'); showPath('path7'); showPath('path8');
  showLabel('lbl4');
  showBalls('path6'); showBalls('path7'); showBalls('path8');
  await wait(1500);
  showNode('.node-s1');
}

runSequence();
</script>
</body>
</html>
